<!DOCTYPE html>
<html lang="pt-br">


<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ torneio.nome }} — Dashboard TV</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0a1628;
            --bg-left: #112038;
            --bg-right: #0e1c30;
            --live: #FF6B00;
            --text-main: #FFFFFF;
            --text-muted: #8fa8c0;
            --badge-ok: #38A169;
            --badge-out: #718096;
            --badge-mid: #D69E2E;
            --accent: #1e90ff;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            background: var(--bg-main);
            color: var(--text-main);
            cursor: default;
            transition: cursor 0.2s ease;
        }

        body.cursor-hidden,
        body.cursor-hidden * {
            cursor: none !important;
        }

        /* ── TV SCREEN: header + main only, no footer row ── */
        .tv-screen {
            height: 100vh;
            display: grid;
            grid-template-rows: auto 1fr;
            gap: 8px;
            padding: 10px 12px 10px;
            transition: opacity 0.35s ease;
        }

        .tv-screen.no-live {
            grid-template-rows: auto 1fr;
        }

        .tv-screen.screen-fade {
            opacity: 0.86;
        }

        /* ── HEADER ── */
        .tv-header {
            position: relative;
            text-align: center;
            padding: 4px 0 2px;
        }

        .tv-title {
            margin: 0;
            font-size: clamp(1.5rem, 2.4vw, 2.5rem);
            font-weight: 800;
            line-height: 1.05;
            letter-spacing: -0.01em;
        }

        .tv-subtitle {
            margin: 2px 0 0;
            color: var(--text-muted);
            font-size: clamp(0.75rem, 1vw, 1rem);
            font-weight: 600;
        }

        .tv-clock {
            position: absolute;
            top: 4px;
            right: 0;
            color: #cbd5e1;
            font-size: 0.88rem;
            font-weight: 700;
            letter-spacing: 0.06em;
        }

        .live-indicator {
            margin-top: 4px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 107, 0, 0.12);
            border: 1px solid rgba(255, 107, 0, 0.5);
            color: #ffd7bd;
            border-radius: 999px;
            padding: 3px 9px;
            font-size: 0.78rem;
            font-weight: 700;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--live);
            animation: pulse 1.9s ease-in-out infinite;
        }

        .hidden {
            display: none !important;
        }

        .fs-button {
            position: fixed;
            right: 14px;
            bottom: 14px;
            z-index: 30;
            border: 1px solid rgba(255, 255, 255, 0.35);
            background: rgba(8, 19, 30, 0.9);
            color: #e2e8f0;
            border-radius: 999px;
            padding: 6px 12px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            cursor: pointer;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.88; }
            50% { transform: scale(1.25); opacity: 0.38; }
            100% { transform: scale(1); opacity: 0.88; }
        }

        /* ── MAIN LAYOUT: left 65% / right 35% ── */
        .tv-main {
            display: grid;
            grid-template-columns: 65% 35%;
            gap: 10px;
            min-height: 0;
            overflow: hidden;
        }

        .tv-main.final-mode {
            grid-template-columns: 1fr;
            place-items: center;
            align-content: center;
        }

        .tv-main.final-mode .left-column {
            display: none;
        }

        .tv-main.final-mode .right-column {
            width: min(1780px, 98vw);
            max-width: 1780px;
            background: transparent;
            padding: 0;
            grid-template-rows: auto;
            justify-content: center;
        }

        .tv-main.final-mode .live-card,
        .tv-main.final-mode .champion-card {
            width: min(1700px, 96vw);
            border-radius: 24px;
            padding: 44px 56px;
            gap: 28px;
        }

        .tv-main.final-mode .live-indicator {
            font-size: 1.8rem;
            padding: 12px 30px;
            gap: 14px;
        }

        .tv-main.final-mode .live-dot {
            width: 18px;
            height: 18px;
        }

        .tv-main.final-mode .teams-row {
            font-size: clamp(4.2rem, 8.4vw, 7.6rem);
            gap: 34px;
        }

        .tv-main.final-mode .score-label {
            font-size: 2.2rem;
        }

        .tv-main.final-mode .score-main {
            font-size: clamp(6rem, 12vw, 11rem);
            margin-top: 14px;
            letter-spacing: 0.04em;
        }

        .tv-main.final-mode .champion-title {
            font-size: 2.3rem;
        }

        .tv-main.final-mode .champion-label {
            font-size: 1.6rem;
            padding: 12px 30px;
        }

        .tv-main.final-mode .champion-team {
            font-size: clamp(5rem, 9.6vw, 8.8rem);
        }

        .tv-main.final-mode .champion-players-title {
            font-size: 1.9rem;
        }

        .tv-main.final-mode .champion-players li {
            font-size: clamp(2.1rem, 4.4vw, 3.6rem);
        }

        .tv-main.final-mode .podio-grid {
            gap: 30px;
            min-height: 620px;
        }

        .tv-main.final-mode .podio-grid.two-items {
            max-width: 1300px;
        }

        .tv-main.final-mode .podio-item {
            border-radius: 18px;
            padding: 22px 16px;
        }

        .tv-main.final-mode .podio-item.podio-campeao {
            min-height: 460px;
        }

        .tv-main.final-mode .podio-item.podio-vice {
            min-height: 370px;
        }

        .tv-main.final-mode .podio-item.podio-terceiro {
            min-height: 300px;
        }

        .tv-main.final-mode .podio-posicao {
            font-size: 1.45rem;
        }

        .tv-main.final-mode .podio-team {
            font-size: clamp(2.4rem, 4.9vw, 4.4rem);
        }

        .tv-main.final-mode .podio-jogadores {
            gap: 10px;
        }

        .tv-main.final-mode .podio-jogadores li {
            font-size: clamp(1.25rem, 2.35vw, 2rem);
        }

        .tv-main.final-mode .next-card,
        .tv-main.final-mode .upcoming-card {
            display: none !important;
        }

        .left-column,
        .right-column {
            border-radius: 10px;
            min-height: 0;
            overflow: hidden;
        }

        .left-column {
            background: var(--bg-left);
            padding: 8px;
            min-height: 0;
            display: flex;
            flex-direction: column;
        }

        .section {
            min-height: 0;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 8px;
            padding: 8px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .section-title {
            margin: 0 0 6px;
            font-size: 0.85rem;
            color: #dbe5ef;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 800;
            flex-shrink: 0;
        }

        /* ── GROUPS GRID: always 2 columns, fills height ── */
        .groups-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 7px;
            flex: 1;
            min-height: 0;
        }

        .group-card {
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 7px 8px;
            background: rgba(255, 255, 255, 0.025);
            transition: border-color 0.35s ease, box-shadow 0.35s ease;
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
        }

        .group-card.highlight {
            border-color: rgba(255, 107, 0, 0.7);
            box-shadow: inset 0 0 0 1px rgba(255, 107, 0, 0.2);
        }

        .group-name {
            margin: 0 0 4px;
            font-size: 0.82rem;
            font-weight: 800;
            color: #ecf4ff;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            flex-shrink: 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.78rem;
        }

        th,
        td {
            padding: 3px 4px;
            text-align: center;
            transition: color 0.25s ease, background-color 0.25s ease;
        }

        th {
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.7rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.07);
        }

        tbody tr:nth-child(even) {
            background: rgba(255, 255, 255, 0.03);
        }

        td.team {
            text-align: left;
            font-weight: 600;
            max-width: 160px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .badge-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            margin-right: 3px;
            vertical-align: middle;
        }

        .badge-label {
            display: inline-flex;
            align-items: center;
            border-radius: 999px;
            padding: 1px 5px;
            font-size: 0.58rem;
            font-weight: 700;
            margin-left: 4px;
            border: 1px solid transparent;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .badge-classificado {
            background: var(--badge-ok);
        }

        .badge-disputa {
            background: var(--badge-mid);
        }

        .badge-eliminado {
            background: var(--badge-out);
        }

        .badge-label.badge-classificado {
            color: #d0ffe3;
            border-color: rgba(56, 161, 105, 0.5);
            background: rgba(56, 161, 105, 0.15);
        }

        .badge-label.badge-disputa {
            color: #fde8b0;
            border-color: rgba(214, 158, 46, 0.5);
            background: rgba(214, 158, 46, 0.15);
        }

        .badge-label.badge-eliminado {
            color: #d7dee8;
            border-color: rgba(113, 128, 150, 0.5);
            background: rgba(113, 128, 150, 0.15);
        }

        .elims {
            display: grid;
            gap: 8px;
            height: calc(100% - 26px);
            grid-template-columns: 1fr;
        }

        .elim-card {
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 8px;
            background: rgba(255, 255, 255, 0.02);
            display: grid;
            gap: 6px;
        }

        .elim-title {
            font-size: 0.9rem;
            font-weight: 700;
            color: #dfe8f0;
        }

        .elim-line {
            display: grid;
            grid-template-columns: 1fr auto auto auto 1fr;
            gap: 8px;
            align-items: center;
            font-size: 1rem;
            font-weight: 700;
        }

        .elim-line .team-a {
            text-align: right;
        }

        .elim-line .team-b {
            text-align: left;
        }

        .status-pill {
            display: inline-flex;
            justify-self: start;
            width: fit-content;
            border-radius: 999px;
            padding: 2px 8px;
            font-size: 0.75rem;
            font-weight: 700;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #e2e8f0;
        }

        .status-pill.live {
            border-color: rgba(255, 107, 0, 0.7);
            color: #ffd7bd;
            background: rgba(255, 107, 0, 0.13);
            animation: pulse 1.9s ease-in-out infinite;
        }

        .right-column {
            background: var(--bg-right);
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-height: 0;
        }

        .live-card {
            border: 1px solid rgba(255, 107, 0, 0.55);
            border-radius: 12px;
            padding: 12px;
            background: rgba(255, 107, 0, 0.06);
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }

        .champion-card {
            border: 1px solid rgba(255, 107, 0, 0.55);
            border-radius: 12px;
            padding: 20px;
            background: rgba(255, 107, 0, 0.08);
            display: grid;
            gap: 14px;
            text-align: center;
        }

        .champion-title {
            font-size: 1rem;
            color: var(--text-muted);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .champion-team {
            font-size: 2.7rem;
            font-weight: 800;
            line-height: 1.1;
        }

        .champion-label {
            display: inline-flex;
            justify-self: center;
            width: fit-content;
            border-radius: 999px;
            padding: 5px 14px;
            border: 1px solid rgba(255, 107, 0, 0.7);
            background: rgba(255, 107, 0, 0.2);
            color: #ffd7bd;
            font-size: 0.82rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .champion-players-title {
            margin-top: 4px;
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.07em;
        }

        .champion-players {
            list-style: none;
            margin: 0;
            padding: 0;
            display: grid;
            gap: 6px;
        }

        .champion-players li {
            font-size: 1.1rem;
            font-weight: 700;
            color: #f8fafc;
        }

        .podio-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 16px;
            align-items: end;
            min-height: 420px;
        }

        .podio-grid.two-items {
            grid-template-columns: repeat(2, minmax(0, 1fr));
            max-width: 1100px;
            justify-self: center;
            width: 100%;
        }

        .podio-item {
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.03);
            padding: 12px;
            display: grid;
            gap: 10px;
            text-align: center;
            align-content: start;
        }

        .podio-item.podio-campeao {
            border-color: rgba(255, 107, 0, 0.75);
            background: rgba(255, 107, 0, 0.16);
            min-height: 300px;
            box-shadow: 0 16px 40px rgba(255, 107, 0, 0.16);
        }

        .podio-item.podio-vice {
            min-height: 245px;
        }

        .podio-item.podio-terceiro {
            min-height: 210px;
        }

        .podio-posicao {
            font-size: 0.86rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .podio-team {
            font-size: 1.2rem;
            font-weight: 800;
            line-height: 1.1;
        }

        .podio-jogadores {
            list-style: none;
            margin: 0;
            padding: 0;
            display: grid;
            gap: 4px;
        }

        .podio-jogadores li {
            font-size: 0.95rem;
            font-weight: 600;
            color: #e2e8f0;
        }

        .live-top {
            display: flex;
            justify-content: center;
        }

        .teams-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            text-align: center;
            font-weight: 800;
            font-size: clamp(1.3rem, 2vw, 2.2rem);
            width: 100%;
        }

        .score-label {
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 700;
            text-align: center;
        }

        .score-main {
            margin-top: 2px;
            font-size: clamp(3rem, 5vw, 5.5rem);
            line-height: 1;
            font-weight: 800;
            color: #fff;
            transition: opacity 0.28s ease, transform 0.28s ease;
        }


        .sets-row {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            text-align: center;
            font-size: 2rem;
            font-weight: 800;
        }

        .score-row {
            text-align: center;
        }

        .score-main.flash {
            opacity: 0.65;
            transform: translateY(-2px);
        }

        .next-card {
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.03);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .upcoming-card {
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.03);
            display: flex;
            flex-direction: column;
            min-height: 0;
            flex: 1;
            overflow: hidden;
        }

        .upcoming-item {
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 7px;
            padding: 8px 10px;
            background: rgba(255, 255, 255, 0.04);
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .upcoming-teams {
            font-size: 1rem;
            font-weight: 800;
            text-align: center;
        }

        .upcoming-meta {
            font-size: 0.78rem;
            color: var(--text-muted);
            text-align: center;
        }

        .next-title {
            text-align: center;
            font-size: 0.78rem;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            font-weight: 700;
            text-transform: uppercase;
        }

        .next-teams {
            text-align: center;
            font-weight: 800;
            font-size: 1.4rem;
        }

        .next-meta {
            text-align: center;
            font-size: 0.82rem;
            color: var(--text-muted);
        }

        .upcoming-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            overflow: hidden;
            min-height: 0;
            flex: 1;
            margin-top: 6px;
        }

        .empty-state {
            flex: 1;
            display: grid;
            place-items: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 600;
        }

        /* ── Live footer hidden by default on TV ── */
        .live-footer {
            display: none;
        }
    </style>
</head>

<body>
    <button class="fs-button" id="fs-button" type="button">Entrar em Tela Cheia</button>

    <div class="tv-screen{% if not live_url %} no-live{% endif %}" id="tv-screen">
        <header class="tv-header">
            <h1 class="tv-title" id="tv-title">{{ torneio.nome }}</h1>
            <p class="tv-subtitle" id="tv-subtitle">Carregando fase...</p>
            <div class="tv-clock" id="tv-clock">--:--</div>
        </header>

        <main class="tv-main">
            <section class="left-column">
                <div class="section" id="left-section"></div>
            </section>

            <aside class="right-column">
                <div class="live-card hidden" id="live-card">
                    <div class="live-top">
                        <div class="live-indicator"><span class="live-dot"></span> AO VIVO</div>
                    </div>
                    <div class="teams-row">
                        <div id="live-team-a">-</div>
                        <div id="live-team-b">-</div>
                    </div>
                    <div class="score-row">
                        <div class="score-label">Set atual</div>
                        <div class="score-main" id="live-current-set">0 × 0</div>
                    </div>
                </div>

                <div class="champion-card hidden" id="champion-card"></div>

                <div class="next-card hidden" id="next-card">
                    <div class="next-title">Próximo Jogo</div>
                    <div class="next-teams" id="next-teams">- VS -</div>
                    <div class="next-meta" id="next-meta">Aguardando definição de tabela</div>
                </div>

                <div class="upcoming-card hidden" id="upcoming-card">
                    <div class="next-title">Próximos Jogos</div>
                    <div class="upcoming-list" id="upcoming-list"></div>
                </div>
            </aside>
        </main>

        {% if live_url %}
        <footer class="live-footer">
            <div class="live-footer-title">ASSISTA AO VIVO</div>
            <iframe src="{{ live_url }}" frameborder="0" frameborder="0"
                allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>
        </footer>
        {% endif %}
    </div>

    {{ initial_dashboard|json_script:"initial-dashboard-data" }}
    {{ initial_live|json_script:"initial-live-data" }}

    <script>
        const slug = "{{ torneio.slug|escapejs }}";
        const intervalMs = "{{ polling_interval }}";
        const dashboardUrl = "{{ dashboard_url }}";
        const liveUrl = "{{ live_data_url }}";
        const parsedPollingMs = Number.parseInt(intervalMs, 10);
        const safePollingMs = Number.isFinite(parsedPollingMs) && parsedPollingMs >= 2000 ? parsedPollingMs : 10000;

        const leftSection = document.getElementById('left-section');
        const subtitle = document.getElementById('tv-subtitle');
        const headerLiveIndicator = document.getElementById('header-live-indicator');
        const liveCard = document.getElementById('live-card');
        const championCard = document.getElementById('champion-card');
        const nextCard = document.getElementById('next-card');
        const upcomingCard = document.getElementById('upcoming-card');
        const upcomingList = document.getElementById('upcoming-list');
        const tvScreen = document.getElementById('tv-screen');
        const tvMain = document.querySelector('.tv-main');
        const fsButton = document.getElementById('fs-button');
        const tvClock = document.getElementById('tv-clock');
        const liveCurrentSet = document.getElementById('live-current-set');
        let lastCurrentSetText = liveCurrentSet.textContent;
        let lastFaseTipo = null;
        let cursorTimer;

        function badgeClass(position, cutoff) {
            if (position <= cutoff) {
                return 'badge-classificado';
            }
            return 'badge-eliminado';
        }

        function badgeLabel(position, cutoff) {
            if (position <= cutoff) {
                return 'Classificado';
            }
            return 'Eliminado';
        }

        function isFinalPhase(faseNome) {
            return (faseNome || '').trim().toLowerCase() === 'final';
        }

        function setFinalMode(enabled) {
            if (enabled) {
                tvMain.classList.add('final-mode');
                return;
            }
            tvMain.classList.remove('final-mode');
        }

        function renderCampeao(dashboardData) {
            const campeao = dashboardData.campeao;
            if (!campeao) {
                championCard.classList.add('hidden');
                championCard.innerHTML = '';
                return;
            }
            const podio = dashboardData.podio || {};
            const getJogadores = (time) => {
                if (!time || !time.jogadores || !time.jogadores.length) {
                    return '<div class="next-meta">Sem jogadores cadastrados</div>';
                }
                return `<ul class="podio-jogadores">${time.jogadores.map((jogador) => `<li>${jogador}</li>`).join('')}</ul>`;
            };
            const podioItems = [
                `<article class="podio-item podio-campeao"><div class="podio-posicao">1º Lugar</div><div class="podio-team">${podio.campeao?.nome || campeao.nome}</div>${getJogadores(podio.campeao || campeao)}</article>`,
                `<article class="podio-item podio-vice"><div class="podio-posicao">2º Lugar</div><div class="podio-team">${podio.vice?.nome || '-'}</div>${getJogadores(podio.vice)}</article>`,
            ];
            if (podio.terceiro) {
                podioItems.push(`<article class="podio-item podio-terceiro"><div class="podio-posicao">3º Lugar</div><div class="podio-team">${podio.terceiro.nome}</div>${getJogadores(podio.terceiro)}</article>`);
            }
            const podioGridClass = podio.terceiro ? 'podio-grid' : 'podio-grid two-items';
            championCard.innerHTML = `<div class="champion-title">Pódio Final</div><div class="${podioGridClass}">${podioItems.join('')}</div>`;
            championCard.classList.remove('hidden');
        }

        function activateFullscreen() {
            if (document.fullscreenElement) {
                fsButton.classList.add('hidden');
                return;
            }
            if (!document.documentElement.requestFullscreen) {
                return;
            }
            document.documentElement.requestFullscreen().then(() => {
                fsButton.classList.add('hidden');
            }).catch(() => {
            });
        }

        function scheduleCursorHide() {
            clearTimeout(cursorTimer);
            document.body.classList.remove('cursor-hidden');
            cursorTimer = setTimeout(() => {
                document.body.classList.add('cursor-hidden');
            }, 5000);
        }

        function updateClock() {
            const now = new Date();
            tvClock.textContent = now.toLocaleTimeString('pt-BR', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
            });
        }

        function renderGroups(dashboardData) {
            const grupos = dashboardData.grupos || [];
            if (!grupos.length) {
                leftSection.innerHTML = '<h2 class="section-title">Classificação — Fase de Grupos</h2><div class="empty-state">Aguardando definição de tabela</div>';
                return;
            }
            const cutoff = dashboardData.fase_ativa?.equipes_avancam || 0;
            const liveGrupoId = dashboardData.live_match?.grupo_id;
            const groupsHtml = grupos.map((grupo) => {
                const linhasBase = grupo.classificacao || [];
                const linhas = linhasBase.map((row) => {
                    const badge = badgeClass(row.posicao, cutoff);
                    const label = badgeLabel(row.posicao, cutoff);
                    return `<tr><td>${row.posicao}</td><td class="team"><span class="badge-dot ${badge}"></span>${row.equipe}<span class="badge-label ${badge}">${label}</span></td><td>${row.jogos}</td><td>${row.vitorias}</td><td>${row.derrotas}</td><td>${row.saldo_sets}</td><td>${row.saldo_pontos}</td></tr>`;
                }).join('');
                const body = linhas || '<tr><td colspan="7">Sem partidas registradas</td></tr>';
                const highlight = liveGrupoId && Number(liveGrupoId) === Number(grupo.id) ? 'highlight' : '';
                return `<article class="group-card ${highlight}"><h3 class="group-name">${grupo.nome.toUpperCase()}</h3><table><thead><tr><th>Pos</th><th>Equipe</th><th>J</th><th>V</th><th>D</th><th>SG</th><th>SP</th></tr></thead><tbody>${body}</tbody></table></article>`;
            }).join('');
            leftSection.innerHTML = `<h2 class="section-title">Classificação — Fase de Grupos</h2><div class="groups-grid">${groupsHtml}</div>`;
        }

        function renderEliminatoria(dashboardData) {
            const confrontos = dashboardData.confrontos || [];
            if (!confrontos.length) {
                leftSection.innerHTML = '<h2 class="section-title">Confrontos — Eliminatória</h2><div class="empty-state">Aguardando definição de tabela</div>';
                return;
            }
            const cards = confrontos.map((confronto, index) => {
                const sets = confronto.sets || [];
                const ganhosA = sets.filter((s) => s.pontos_a > s.pontos_b).length;
                const ganhosB = sets.filter((s) => s.pontos_b > s.pontos_a).length;
                const status = confronto.status || 'AGENDADA';
                const meta = status === 'FINALIZADA' ? 'Finalizado' : status === 'AO_VIVO' ? 'AO VIVO' : `Jogo ${confronto.ordem_cronograma || index + 1}`;
                const statusClass = status === 'AO_VIVO' ? 'status-pill live' : 'status-pill';
                const score = status === 'AGENDADA' ? '<span></span><span>VS</span><span></span>' : `<span>${ganhosA}</span><span>×</span><span>${ganhosB}</span>`;
                const title = confronto.ordem_cronograma ? `Confronto ${confronto.ordem_cronograma}` : `Confronto ${index + 1}`;
                return `<article class="elim-card"><div class="elim-title">${title}</div><div class="elim-line"><span class="team-a">${confronto.equipe_a}</span>${score}<span class="team-b">${confronto.equipe_b}</span></div><div class="${statusClass}">${meta}</div></article>`;
            }).join('');
            leftSection.innerHTML = `<h2 class="section-title">Confrontos — Eliminatória</h2><div class="elims">${cards}</div>`;
        }

        function renderSidebar(dashboardData) {
            const fase = dashboardData.fase_ativa;
            if (!fase) {
                subtitle.textContent = 'Aguardando definição de fase';
                setFinalMode(false);
                championCard.classList.add('hidden');
                leftSection.innerHTML = '<div class="empty-state">Aguardando definição de tabela</div>';
                return;
            }
            subtitle.textContent = fase.nome;
            const finalMode = fase.tipo === 'ELIMINATORIA' && isFinalPhase(fase.nome);
            setFinalMode(finalMode);
            renderCampeao(dashboardData);
            if (lastFaseTipo && lastFaseTipo !== fase.tipo) {
                tvScreen.classList.add('screen-fade');
                setTimeout(() => tvScreen.classList.remove('screen-fade'), 280);
            }
            lastFaseTipo = fase.tipo;
            if (finalMode) {
                leftSection.innerHTML = '';
                return;
            }
            if (fase.tipo === 'GRUPO') {
                renderGroups(dashboardData);
            } else {
                renderEliminatoria(dashboardData);
            }
        }

        function renderUpcomingMatches(matches) {
            if (!matches.length) {
                upcomingCard.classList.add('hidden');
                upcomingList.innerHTML = '';
                return;
            }
            const items = matches.map((match) => {
                const baseMeta = `Jogo ${match.ordem_cronograma || '-'}`;
                const phaseOrGroup = match.grupo || match.fase;
                const meta = phaseOrGroup ? `${baseMeta} • ${phaseOrGroup}` : baseMeta;
                return `<article class="upcoming-item"><div class="upcoming-teams">${match.equipe_a} VS ${match.equipe_b}</div><div class="upcoming-meta">${meta}</div></article>`;
            }).join('');
            upcomingList.innerHTML = items;
            upcomingCard.classList.remove('hidden');
        }

        function renderLivePanel(liveData) {
            const highlight = liveData.highlight;
            const upcomingMatches = liveData.upcoming_matches || [];
            if (!highlight) {
                headerLiveIndicator.classList.add('hidden');
                liveCard.classList.add('hidden');
                nextCard.classList.add('hidden');
                renderUpcomingMatches(upcomingMatches);
                return;
            }

            if (highlight.status === 'AO_VIVO') {
                headerLiveIndicator.classList.remove('hidden');
                nextCard.classList.add('hidden');
                liveCard.classList.remove('hidden');
                document.getElementById('live-team-a').textContent = highlight.equipe_a;
                document.getElementById('live-team-b').textContent = highlight.equipe_b;
                const sets = highlight.sets || [];
                const current = sets.length ? sets[sets.length - 1] : { pontos_a: 0, pontos_b: 0 };
                const currentText = `${current.pontos_a} × ${current.pontos_b}`;
                if (lastCurrentSetText !== currentText) {
                    liveCurrentSet.classList.add('flash');
                    setTimeout(() => liveCurrentSet.classList.remove('flash'), 260);
                }
                liveCurrentSet.textContent = currentText;
                lastCurrentSetText = currentText;
                renderUpcomingMatches(upcomingMatches);
            } else {
                headerLiveIndicator.classList.add('hidden');
                liveCard.classList.add('hidden');
                if (!upcomingMatches.length) {
                    nextCard.classList.add('hidden');
                    renderUpcomingMatches([]);
                    return;
                }
                nextCard.classList.remove('hidden');
                document.getElementById('next-teams').textContent = `${highlight.equipe_a} VS ${highlight.equipe_b}`;
                const meta = highlight.grupo ? `Jogo ${highlight.ordem_cronograma || '-'} • ${highlight.grupo}` : `Jogo ${highlight.ordem_cronograma || '-'}`;
                document.getElementById('next-meta').textContent = meta;
                renderUpcomingMatches(upcomingMatches);
            }
        }

        async function updateDashboard() {
            try {
                const cacheBypass = { cache: 'no-store' };
                const [dashboardRes, liveRes] = await Promise.all([
                    fetch(dashboardUrl, cacheBypass),
                    fetch(liveUrl, cacheBypass),
                ]);
                if (!dashboardRes.ok || !liveRes.ok) {
                    return;
                }
                const dashboardData = await dashboardRes.json();
                const liveData = await liveRes.json();
                renderSidebar(dashboardData);
                renderLivePanel(liveData);
            } catch (error) {
            }
        }

        const initialDashboard = JSON.parse(document.getElementById('initial-dashboard-data').textContent);
        const initialLive = JSON.parse(document.getElementById('initial-live-data').textContent);
        renderSidebar(initialDashboard);
        renderLivePanel(initialLive);
        updateClock();
        setInterval(updateClock, 1000);
        fsButton.addEventListener('click', activateFullscreen);
        document.addEventListener('fullscreenchange', () => {
            if (document.fullscreenElement) {
                fsButton.classList.add('hidden');
            }
        });
        ['mousemove', 'keydown', 'touchstart', 'pointermove'].forEach((eventName) => {
            document.addEventListener(eventName, scheduleCursorHide, { passive: true });
        });
        scheduleCursorHide();
        setInterval(updateDashboard, safePollingMs);
    </script>
</body>

</html>
