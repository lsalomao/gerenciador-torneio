{% extends 'base.html' %}

{% block title %}Gerar Eliminatória — {{ fase.nome }}{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">
    <h1 class="text-xl font-bold mb-4">Gerar Eliminatória — {{ fase.nome }}</h1>
    <div class="bg-white p-6 rounded-lg border">
        <p class="mb-4">Deseja gerar a fase eliminatória baseada nos classificados da fase <strong>{{ fase.nome }}</strong>?</p>
        <form method="post">
            {% csrf_token %}
            <div class="flex gap-3">
                <button type="submit" class="bg-blue-600 text-white py-2 px-4 rounded">Gerar</button>
                <a href="{% url 'admin_fase_detail' fase.pk %}" class="bg-gray-100 py-2 px-4 rounded">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
